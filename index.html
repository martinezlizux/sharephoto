<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spruce Spirit Photobooth</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header class="top-bar">
      Virtual PhotoBooth
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-bg-elements">
        <img src="/confetti.png" alt="" class="confetti">
      </div>

      <div class="hero-container">
        <div class="dragon-mascot-container">
          <img src="/dragon_mascot.png" alt="Spruce Dragon" class="dragon-mascot">
        </div>

        <div class="hero-text-content">
          <div class="school-shield-container">
            <img src="/school_shield.png" alt="Spruce Elementary" class="school-shield">
          </div>
          <h1 class="headline">Unleash Your Inner Dragon</h1>
          <p class="subtitle">Step into the photobooth, strike a pose, and let share your vibe.</p>

          <div class="upload-container">
            <label for="photoInput" class="btn-upload">
              UPLOAD YOUR PHOTO
            </label>
            <input type="file" id="photoInput" accept="image/*" hidden>
          </div>

          <p class="tagline">Show off your school spirit!</p>
        </div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
      <div class="gallery-header">
        <div class="badge">
          <span class="icon">📅</span>
          Dia del niño Dual program
        </div>
        <h2 class="gallery-title">Dragon Gallery</h2>
      </div>

      <div id="galleryGrid" class="gallery-grid">
        <!-- Gallery items will appear here -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <img src="/spruce=logo.png" alt="Spruce" class="footer-logo">
      <p>© 2024 Spruce Spirit Photobooth</p>
    </footer>

    <!-- Photo Modal -->
    <div id="photoModal" class="modal-overlay hidden">
      <div class="modal-content">
        <button id="closeModal" class="btn-close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
            stroke="currentColor" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <div class="photobooth-interface">
          <div class="preview-header">
            <h3>Dragon Transformation</h3>
            <p id="modalStatus">Ready to add some magic?</p>
          </div>

          <div id="photoViewfinder" class="viewfinder">
            <!-- Image preview or spinner will be here -->
            <div class="processing-state hidden" id="processingState">
              <div class="countdown-container">
                <span id="countdownTimer" class="countdown-number">8</span>
              </div>
              <p id="processingText">Summoning the magic...</p>
            </div>
          </div>

          <div class="modal-actions">
            <button id="applyFilterBtn" class="action-btn filter-btn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="btn-icon">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
              </svg>
              Apply Filter
            </button>
            <button id="newPhotoBtn" class="action-btn retake-btn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="btn-icon">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
              </svg>
              New <span class="hide-mobile">photo</span>
            </button>
            <button id="shareGalleryBtn" class="action-btn share-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon">
                <path
                  d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3c1.54 0 2.946.666 3.913 1.738C12.565 3.666 13.971 3 15.512 3c2.974 0 5.438 2.322 5.438 5.25 0 3.924-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
              </svg>
              Share <span class="hide-mobile">in gallery</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
